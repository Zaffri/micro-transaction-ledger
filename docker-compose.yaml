services:
  api-gateway:
    image: nginx
    container_name: api-gateway
    restart: on-failure
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:8080"
    environment:
      - NGINX_PORT=8080

  accounts-service:
    build: 
      context: ./accounts
    container_name: accounts-service
    environment:
      - PORT=8081
    develop:
      watch:
        - action: rebuild
          path: ./accounts
  
  transactions-service:
    build: 
      context: ./transactions
    container_name: transactions-service
    environment:
      - PORT=8081
    develop:
      watch:
        - action: rebuild
          path: ./transactions

  fraud-service:
    build: 
      context: ./fraud
    container_name: fraud-service
    environment:
      - PORT=8081
    develop:
      watch:
        - action: rebuild
          path: ./fraud
