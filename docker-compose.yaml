services:
  api-gateway:
    image: nginx
    container_name: api-gateway
    restart: on-failure
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:8080"
    environment:
      - NGINX_PORT=8080

  web-ui:
    build:
      context: ./web-ui
    container_name: web-ui
    volumes:
      - ./web-ui:/app
      - /app/node_modules # anonymous volume - prevent host node_modules from overwriting container node_modules
    environment:
      - NODE_ENV=development

  rabbitmq:
    image: rabbitmq:4.3.0-management-alpine
    container_name: rabbitmq
    restart: on-failure
    environment:
      - 'RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS=-rabbitmq_management path_prefix "/queue"'
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_port_connectivity"]
      interval: 4s
      timeout: 5s
      retries: 3
      start_period: 5s

  accounts-service:
    build: 
      context: ./accounts
    container_name: accounts-service
    depends_on:
      accounts-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      - PORT=8081
      - DATABASE_CONNECTION=postgres://user:pass@accounts-db:5432/accounts # dev only
      - RABBITMQ_CONNECTION=amqp://guest:guest@rabbitmq:5672 # dev only
    develop:
      watch:
        - action: rebuild
          path: ./accounts

  accounts-db:
    image: postgres:14.23-alpine
    container_name: accounts-db
    restart: always
    shm_size: 128mb
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass # dev only
      - POSTGRES_DB=accounts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432"]
      interval: 4s
      timeout: 5s
      retries: 3
      start_period: 5s

  fraud-service:
    build: 
      context: ./fraud
    container_name: fraud-service
    depends_on:
      fraud-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      - PORT=8081
      - DATABASE_CONNECTION=postgres://user:pass@fraud-db:5432/fraud # dev only
      - RABBITMQ_CONNECTION=amqp://guest:guest@rabbitmq:5672 # dev only
    develop:
      watch:
        - action: rebuild
          path: ./fraud

  fraud-db:
    image: postgres:14.23-alpine
    container_name: fraud-db
    restart: always
    shm_size: 128mb
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass # dev only
      - POSTGRES_DB=fraud
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432"]
      interval: 3s
      timeout: 5s
      retries: 3
      start_period: 5s
